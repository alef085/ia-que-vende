    - generic [ref=e265]: MEGA-PROMPT 1
    - heading "Diagnóstico Completo do Negócio" [level=2] [ref=e266]
    - generic [ref=e267]: "Use: ChatGPT, Claude ou Gemini"
    - generic [ref=e269]: "Você será meu estrategista de marketing para pequenos negócios. Antes de criar qualquer conteúdo, analise meu negócio: [cole o bloco C.O.A.T.] Responda em 5 partes: 1. Qual é a principal dor do meu cliente ideal? (não a dor óbvia — a dor que ele sente mas não fala abertamente) 2. Qual é o principal desejo que ele quer alcançar? (o desejo emocional por trás, não o declarado) 3. Qual é a objeção que mais impede a compra? (o que ele pensa antes de dizer \"vou pensar\") 4. Qual mensagem minha marca deveria repetir com frequência? (a frase que, se meu cliente ouvisse toda semana, me tornaria referência) 5. Qual tipo de conteúdo tem mais chance de gerar clientes para mim? (baseado no meu nicho, meu avatar e minha oferta) Depois me diga: quais informações estão faltando para criar respostas ainda mais precisas sobre meu negócio?"
