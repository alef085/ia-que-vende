    - paragraph [ref=e230]:
      - text: ✅
      - strong [ref=e231]: "O que você vai aprender aqui:"
    - blockquote [ref=e232]:
      - paragraph [ref=e233]:
        - emphasis [ref=e234]: "\"Você é social media de um pet shop chamado PataFeliz, em Fortaleza, especializado em cuidados premium para cães de médio e grande porte. Nosso cliente típico é mulher, 30-45 anos, classe B, que trata o pet como membro da família, sente culpa quando trabalha muito e quer saber que seu animal está bem cuidado. Crie um carrossel para Instagram com 6 slides mostrando nossa rotina de banho e tosa. Objetivo: gerar salvamentos e visitas ao WhatsApp. Tom: acolhedor, especialista, sem linguagem técnica. Slide final: CTA para agendar pelo link da bio.\""
    - paragraph [ref=e235]: Essa diferença é a diferença entre post que ninguém vê e post que vende.
