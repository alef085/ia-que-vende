    - paragraph [ref=e248]: "A maioria pede tudo de uma vez e recebe resposta rasa. Os que obtêm resultados excepcionais constroem com a IA em etapas:"
    - generic [ref=e250]: "CAMADA 1 — CONTEXTO: Quem é o negócio? CAMADA 2 — CLIENTE: Quem compra? Qual a vida dele? CAMADA 3 — PROBLEMA: Qual dor o cliente sente? CAMADA 4 — OFERTA: O que será vendido? CAMADA 5 — CANAL: Instagram, WhatsApp, Google, anúncio? CAMADA 6 — FORMATO: Post, carrossel, mensagem, anúncio? CAMADA 7 — OTIMIZAÇÃO: Peça melhoria, variações e ajustes."
    - paragraph [ref=e251]:
      - strong [ref=e252]: "Na prática:"
      - text: Comece com as camadas 1-3. Depois adicione 4-5. Por último peça variações com a camada 7.
