    - generic [ref=e285]: "Você é especialista em criação de ofertas para pequenos negócios. Meu negócio: [cole o bloco C.O.A.T.] Meu produto ou serviço principal: [descreva com detalhes] Hoje eu vendo assim (como divulgo atualmente): [descreva ou cole seu texto atual] Transforme essa oferta em algo mais desejável. Entregue: 1. Diagnóstico da minha oferta atual: o que está fraco, genérico ou pouco claro — seja honesto. 2. Nova promessa principal. (a transformação que o cliente experimenta, não o serviço) 3. 5 formas diferentes de apresentar essa oferta para públicos com mentalidades diferentes (urgente, desconfiado, comparador, racional e emocional). 4. 3 bônus simples que posso incluir sem aumentar muito meu custo mas que aumentam o valor percebido. 5. 3 garantias ou redutores de risco que façam sentido para meu negócio. 6. 5 chamadas para ação para WhatsApp. 7. Versão curta para bio do Instagram (máx. 150 caracteres). 8. Versão para post de Instagram. 9. Versão para anúncio pago no Meta Ads. 10. Versão para mensagem direta de abordagem no WhatsApp. Importante: não crie promessa exagerada. Quero oferta forte, mas real."
