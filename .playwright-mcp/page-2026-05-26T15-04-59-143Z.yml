    - generic [ref=e242]: C — CONTEXTO → Quem você é, onde está, o que faz O — OBJETIVO → O que você quer que o leitor FAÇA ou SINTA A — AVATAR → Para quem exatamente você está falando T — TOM → Como sua marca fala e como NÃO fala
    - paragraph [ref=e243]: Quanto mais você preenche o C.O.A.T., mais a IA vira especialista no seu negócio.
