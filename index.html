<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aleia Negócios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #07090f;
      --txt: #f1f5f9;
      --txt2: #94a3b8;
      --amber: #f59e0b;
      --f-head: 'Syne', sans-serif;
      --f-body: 'DM Sans', sans-serif;
    }
    body {
      font-family: var(--f-body);
      background-color: var(--bg);
      color: var(--txt);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      overflow: hidden;
      position: relative;
    }
    .glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .content {
      position: relative;
      z-index: 1;
      max-width: 500px;
    }
    h1 {
      font-family: var(--f-head);
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 12px;
    }
    h1 span {
      color: var(--amber);
    }
    p {
      color: var(--txt2);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--amber);
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.2);
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="content">
    <div class="badge">Em breve</div>
    <h1>Aleia <span>Negócios</span></h1>
    <p>Estamos construindo soluções inteligentes com inteligência artificial para o seu negócio.</p>
  </div>
</body>
</html>
